<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Mídia - Rock do Código</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Substitua pela URL da sua imagem ou use o arquivo local */
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        /* Player de Áudio Personalizado */
        .audio-player {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            background: #e63946;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #f1faee; color: #1d3557; }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #e63946;
        }

        /* Container do Vídeo */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .label { font-size: 0.8rem; margin-bottom: 5px; display: block; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rock do Código</h1>

    <div class="audio-player">
        <span class="label">OUVIR MÚSICA (MP3)</span>
        <audio id="meuAudio">
            <source src="SUA_MUSICA.mp3" type="audio/mpeg">
            Seu navegador não suporta o elemento de áudio.
        </audio>
        
        <input type="range" id="progresso" value="0" max="100">
        
        <div class="controls">
            <button onclick="playPause()" id="btnPlay">PLAY</button>
            <button onclick="stopAudio()">STOP</button>
        </div>
    </div>

    <span class="label">VÍDEO DA AULA / CLIPE</span>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/ID_DO_VIDEO" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
        </iframe>
    </div>
</div>

<script>
    const audio = document.getElementById('meuAudio');
    const barraProgresso = document.getElementById('progresso');
    const btnPlay = document.getElementById('btnPlay');

    function playPause() {
        if (audio.paused) {
            audio.play();
            btnPlay.innerText = "PAUSE";
        } else {
            audio.pause();
            btnPlay.innerText = "PLAY";
        }
    }

    function stopAudio() {
        audio.pause();
        audio.currentTime = 0;fg
        btnPlay.innerText = "PLAY";
    }

    // Atualiza a barra de progresso conforme a música toca
    audio.ontimeupdate = function() {
        const porcentagem = (audio.currentTime / audio.duration) * 100;
        barraProgresso.value = porcentagem;
    };

    // Permite clicar na linha do tempo para mudar a posição da música
    barraProgresso.oninput = function() {
        const tempo = (barraProgresso.value * audio.duration) / 100;
        audio.currentTime = tempo;
    };
</script>

</body>
</html>
